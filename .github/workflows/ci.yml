name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No dependencies to install — the apps are single-file HTML.
      - name: Run smoke tests
        run: node scripts/smoke-test.js

      - name: Run résumé parser tests
        run: node scripts/test-resume-parser.js

      - name: Run client portal guardrail tests
        run: node scripts/test-client-portal.js

  secrets-guard:
    name: No secrets committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Belt-and-braces: the smoke test scans the app files, this catches a
      # secret slipped into any other tracked file.
      - name: Scan tracked files for secret values
        run: |
          if git grep -nIE 'sb_secret_[A-Za-z0-9_-]+|eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]{30,}\.[A-Za-z0-9_-]+' -- . ':!scripts/smoke-test.js'; then
            echo "::error::A secret-looking value is committed. Remove it and rotate the key."
            exit 1
          fi
          echo "No secret values found in tracked files."

      - name: Ensure env files are not tracked
        run: |
          if git ls-files --error-unmatch .env .env.local 2>/dev/null; then
            echo "::error::.env files must not be committed."
            exit 1
          fi
          echo "No .env files tracked."
